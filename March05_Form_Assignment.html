<!DOCTYPE html>
<html>
<head>
<title>Register Form</title>
</head>

<body>

<h2 align="center">Register</h2>

<form>

<table align="center" cellpadding="8">

<tr>
<td>Full Name* :</td>
<td>
<input type="text" placeholder="First Name" required>
<input type="text" placeholder="Last Name" required>
</td>
</tr>

<tr>
<td>Address :</td>
<td><textarea rows="4" cols="30"></textarea></td>
</tr>

<tr>
<td>Email Address* :</td>
<td><input type="email" required></td>
</tr>

<tr>
<td>Phone* :</td>
<td><input type="tel" required></td>
</tr>

<tr>
<td>Gender* :</td>
<td>
<input type="radio" name="gender" required> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td>Hobbies :</td>
<td>
<input type="checkbox"> Cricket <br>
<input type="checkbox"> Movies <br>
<input type="checkbox"> Football
</td>
</tr>

<tr>
<td>File Upload :</td>
<td><input type="file"></td>
</tr>

<tr>
<td>Languages :</td>
<td><input type="text"></td>
</tr>

<tr>
<td>Skills :</td>
<td>
<select>
<option selected disabled>Select Skills</option>
<option>Python</option>
<option>Java</option>
<option>CPP</option>
<option>SQL</option>
</select>
</td>
</tr>

<tr>
<td>Country* :</td>
<td>
<select required>
<option selected disabled>Select Country</option>
<option>USA</option>
<option>UK</option>
<option>Australia</option>
<option>India</option>
</select>
</td>
</tr>

<tr>
<td>DOB :</td>
<td>
<select>
<option>Year</option>
<option>1990</option><option>1991</option><option>1992</option>
<option>1993</option><option>1994</option><option>1995</option>
<option>1996</option><option>1997</option><option>1998</option>
<option>1999</option><option>2000</option><option>2001</option>
<option>2002</option><option>2003</option><option>2004</option>
<option>2005</option><option>2006</option><option>2007</option>
<option>2008</option><option>2009</option><option>2010</option>
</select>

<select>
<option>Month</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option><option>11</option><option>12</option>
</select>

<select>
<option>Day</option>
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option><option>11</option><option>12</option>
<option>13</option><option>14</option><option>15</option>
<option>16</option><option>17</option><option>18</option>
<option>19</option><option>20</option><option>21</option>
<option>22</option><option>23</option><option>24</option>
<option>25</option><option>26</option><option>27</option>
<option>28</option><option>29</option><option>30</option>
<option>31</option>
</select>
</td>
</tr>

<tr>
<td>Password :</td>
<td><input type="password"></td>
</tr>

<tr>
<td>Confirm Password :</td>
<td><input type="password"></td>
</tr>

<tr>
<td></td>
<td>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

</body>
</html>
